<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Jalal Awan, Ph.D.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/apple-touch-icon.png">
</head>
<body>

  <div class="page-header">
    <div class="container">
      <div class="label">Contact</div>
      <h1>Get in Touch</h1>
      <p>Available for consulting engagements, regulatory proceedings, and research collaborations</p>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div style="max-width:560px; margin:0 auto;">
        <div class="label">Get in Touch</div>
        <h2>Send a Message</h2>
        <div class="divider"></div>

        <form id="contactForm" action="https://formsubmit.co/jalalawan@gmail.com" method="POST">

          <!-- FormSubmit config -->
          <input type="hidden" name="_subject" value="New inquiry — jonesawan.com">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="contact.html?success=1">
          <input type="text" name="_honey" style="display:none">

          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>

          <div class="form-group">
            <label for="org">Organization</label>
            <input type="text" id="org" name="organization" placeholder="Company, agency, or firm">
          </div>

          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="e.g. CPUC proceeding, consulting, research...">
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your project or question..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">
            Send Message
          </button>

          <div class="form-success" id="formSuccess" style="display:none;">
            Message sent — I'll get back to you within 1–2 business days.
          </div>

        </form>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script>
    if (window.location.search.includes('success')) {
      document.getElementById('formSuccess').style.display = 'block';
    }
  </script>
</body>
</html>
