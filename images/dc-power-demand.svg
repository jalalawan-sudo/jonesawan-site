<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of California data center power demand forecast">
  <defs>
    <pattern id="dot-bg-h" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="0.9" fill="#1A2534" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" fill="#F1EAD8"/>
  <rect width="1200" height="360" fill="url(#dot-bg-h)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#E3120B"/>

  <!-- California outline (stylized, geometric) — left side -->
  <g transform="translate(80 60)">
    <path d="M40 10 L110 5 L140 40 L165 75 L190 110 L215 160 L235 210 L245 250 L180 260 L140 245 L95 220 L60 190 L45 160 L35 120 L30 80 L35 40 Z"
          fill="#4E7C7A" stroke="#1A2534" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Data center pins on CA (dots with squares) -->
    <g>
      <!-- Bay Area cluster -->
      <rect x="72" y="102" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
      <rect x="90" y="118" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
      <rect x="105" y="105" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
      <!-- Central Valley -->
      <rect x="130" y="150" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
      <!-- LA basin -->
      <rect x="170" y="200" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
      <rect x="188" y="210" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
      <!-- Imperial -->
      <rect x="215" y="230" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.5"/>
    </g>
    <!-- Cross-hatch pattern to indicate energy stress on Bay Area -->
    <g fill="none" stroke="#F5C947" stroke-width="1.2" opacity="0.7">
      <circle cx="92" cy="120" r="30"/>
      <circle cx="92" cy="120" r="42"/>
    </g>
    <text x="140" y="285" text-anchor="middle" fill="#1A2534" font-family="Georgia, serif" font-style="italic" font-size="10" opacity="0.7">DATA-CENTER CLUSTERS</text>
  </g>

  <!-- Forecast area chart -->
  <g transform="translate(440 70)">
    <!-- Axes -->
    <line x1="0" y1="220" x2="620" y2="220" stroke="#1A2534" stroke-width="1.8"/>
    <line x1="0" y1="0" x2="0" y2="220" stroke="#1A2534" stroke-width="1.8"/>
    <!-- Gridlines -->
    <g stroke="#1A2534" stroke-width="0.6" opacity="0.20">
      <line x1="0" y1="55" x2="620" y2="55"/>
      <line x1="0" y1="110" x2="620" y2="110"/>
      <line x1="0" y1="165" x2="620" y2="165"/>
    </g>
    <!-- Baseline demand area -->
    <path d="M0 200 L100 195 L200 190 L300 187 L400 184 L500 180 L620 175 L620 220 L0 220 Z" fill="#4E7C7A" opacity="0.50"/>
    <!-- Data center demand growth area -->
    <path d="M0 200 L100 190 L200 172 L300 145 L400 108 L500 65 L620 20 L620 175 L500 180 L400 184 L300 187 L200 190 L100 195 L0 200 Z" fill="#E3120B" opacity="0.40"/>
    <!-- Data-center line -->
    <path d="M0 200 L100 190 L200 172 L300 145 L400 108 L500 65 L620 20" stroke="#E3120B" stroke-width="3.2" fill="none" stroke-linecap="round"/>
    <!-- Y-axis labels -->
    <g fill="#1A2534" font-family="Georgia, serif" font-size="10" text-anchor="end" opacity="0.75">
      <text x="-6" y="224">0</text>
      <text x="-6" y="169">3 GW</text>
      <text x="-6" y="114">6 GW</text>
      <text x="-6" y="59">9 GW</text>
      <text x="-6" y="8">12 GW</text>
    </g>
    <!-- X-axis labels -->
    <g fill="#1A2534" font-family="Georgia, serif" font-size="10" text-anchor="middle" opacity="0.75">
      <text x="0" y="238">'24</text>
      <text x="100" y="238">'25</text>
      <text x="200" y="238">'26</text>
      <text x="300" y="238">'27</text>
      <text x="400" y="238">'28</text>
      <text x="500" y="238">'29</text>
      <text x="620" y="238">'30</text>
    </g>
    <!-- Callout: 10 GW / $73B -->
    <g transform="translate(430 30)">
      <rect x="0" y="0" width="180" height="55" fill="#F1EAD8" stroke="#E3120B" stroke-width="2"/>
      <text x="90" y="24" text-anchor="middle" fill="#1A2534" font-family="Georgia, serif" font-weight="700" font-size="17">up to 10 GW</text>
      <text x="90" y="44" text-anchor="middle" fill="#E3120B" font-family="Georgia, serif" font-style="italic" font-size="13">$73B PG&amp;E grid plan</text>
    </g>
    <!-- Legend -->
    <g transform="translate(0 265)" font-family="Georgia, serif" font-size="11" fill="#1A2534">
      <rect x="0" y="-8" width="14" height="10" fill="#4E7C7A" opacity="0.50"/>
      <text x="22" y="1">baseline</text>
      <rect x="120" y="-8" width="14" height="10" fill="#E3120B" opacity="0.40"/>
      <text x="142" y="1">hyperscaler load</text>
    </g>
  </g>
</svg>
