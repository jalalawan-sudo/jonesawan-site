<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of a utility bill with rising cost indicators">
  <defs>
    <pattern id="dot-bg-a" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="0.9" fill="#1A2534" opacity="0.08"/>
    </pattern>
  </defs>
  <!-- Cream background -->
  <rect width="1200" height="360" fill="#F1EAD8"/>
  <rect width="1200" height="360" fill="url(#dot-bg-a)"/>
  <!-- Thin top rule (Economist-style) -->
  <rect x="0" y="0" width="1200" height="6" fill="#E3120B"/>

  <!-- Utility bill (envelope + statement) — left side -->
  <g transform="translate(90 70)">
    <!-- Bill paper -->
    <rect x="0" y="0" width="380" height="230" fill="#FBF6EA" stroke="#1A2534" stroke-width="2.5"/>
    <!-- Header strip -->
    <rect x="0" y="0" width="380" height="42" fill="#1A2534"/>
    <text x="18" y="28" fill="#F1EAD8" font-family="Georgia, serif" font-weight="700" font-size="17" letter-spacing="1">ELECTRIC · STATEMENT</text>
    <!-- Line items -->
    <g stroke="#1A2534" stroke-width="1.2" opacity="0.55">
      <line x1="20" y1="75" x2="360" y2="75"/>
      <line x1="20" y1="100" x2="300" y2="100"/>
      <line x1="20" y1="125" x2="340" y2="125"/>
      <line x1="20" y1="150" x2="280" y2="150"/>
    </g>
    <!-- Bar chart of increases -->
    <g transform="translate(20 168)">
      <rect x="0" y="30" width="26" height="18" fill="#6B8AA8"/>
      <rect x="34" y="20" width="26" height="28" fill="#6B8AA8"/>
      <rect x="68" y="10" width="26" height="38" fill="#4E7C7A"/>
      <rect x="102" y="0" width="26" height="48" fill="#E3120B"/>
    </g>
    <!-- Amount due -->
    <text x="200" y="200" fill="#1A2534" font-family="Georgia, serif" font-weight="700" font-size="26">$639</text>
    <text x="200" y="216" fill="#1A2534" font-family="Georgia, serif" font-style="italic" font-size="10" opacity="0.75">AVG. ANNUAL SHORTFALL</text>
  </g>

  <!-- Red edit / correction marks -->
  <g transform="translate(400 90)" stroke="#E3120B" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M50 60 L110 25"/>
    <path d="M50 100 L130 65"/>
    <circle cx="140" cy="80" r="28" opacity="0.95"/>
  </g>

  <!-- Right side: rising rate line chart -->
  <g transform="translate(680 60)">
    <!-- Chart frame -->
    <line x1="0" y1="240" x2="440" y2="240" stroke="#1A2534" stroke-width="1.8"/>
    <line x1="0" y1="0" x2="0" y2="240" stroke="#1A2534" stroke-width="1.8"/>
    <!-- Gridlines -->
    <g stroke="#1A2534" stroke-width="0.6" opacity="0.22">
      <line x1="0" y1="60" x2="440" y2="60"/>
      <line x1="0" y1="120" x2="440" y2="120"/>
      <line x1="0" y1="180" x2="440" y2="180"/>
    </g>
    <!-- Trend line (rising) -->
    <path d="M0 210 L80 195 L160 165 L240 130 L320 90 L400 45" stroke="#E3120B" stroke-width="3.4" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Area under -->
    <path d="M0 210 L80 195 L160 165 L240 130 L320 90 L400 45 L400 240 L0 240 Z" fill="#E3120B" opacity="0.10"/>
    <!-- Data points -->
    <g fill="#E3120B" stroke="#1A2534" stroke-width="1.5">
      <circle cx="0" cy="210" r="4"/>
      <circle cx="80" cy="195" r="4"/>
      <circle cx="160" cy="165" r="4"/>
      <circle cx="240" cy="130" r="4"/>
      <circle cx="320" cy="90" r="4"/>
      <circle cx="400" cy="45" r="5.5"/>
    </g>
    <!-- Label -->
    <text x="400" y="30" fill="#1A2534" font-family="Georgia, serif" font-weight="700" font-size="14" text-anchor="end">+39% (2019–2025)</text>
    <text x="0" y="260" fill="#1A2534" font-family="Georgia, serif" font-style="italic" font-size="10" opacity="0.7">CA RESIDENTIAL RATES · INDEX</text>
  </g>
</svg>
