<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of climate-tech startup Series B funding">
  <defs>
    <pattern id="dot-bg-c" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="0.9" fill="#1A2534" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" fill="#F1EAD8"/>
  <rect width="1200" height="360" fill="url(#dot-bg-c)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#E3120B"/>

  <!-- Large upward arrow with battery inside -->
  <g transform="translate(120 60)">
    <!-- Arrow shape -->
    <path d="M0 250 L0 130 L60 130 L60 40 L120 40 L120 130 L180 130 L90 20 Z" fill="#4E7C7A" stroke="#1A2534" stroke-width="2.5" stroke-linejoin="miter"/>
    <!-- Small battery inside arrow -->
    <g transform="translate(60 155)">
      <rect x="0" y="0" width="60" height="80" fill="#F5C947" stroke="#1A2534" stroke-width="2"/>
      <rect x="20" y="-8" width="20" height="10" fill="#1A2534"/>
      <line x1="12" y1="24" x2="48" y2="24" stroke="#1A2534" stroke-width="2"/>
      <line x1="12" y1="42" x2="48" y2="42" stroke="#1A2534" stroke-width="2"/>
      <line x1="12" y1="60" x2="48" y2="60" stroke="#1A2534" stroke-width="2"/>
    </g>
  </g>

  <!-- Ascending bar chart -->
  <g transform="translate(400 80)">
    <!-- Baseline -->
    <line x1="0" y1="230" x2="500" y2="230" stroke="#1A2534" stroke-width="1.8"/>
    <!-- Bars -->
    <g stroke="#1A2534" stroke-width="1.8">
      <rect x="20" y="185" width="50" height="45" fill="#6B8AA8"/>
      <rect x="90" y="150" width="50" height="80" fill="#6B8AA8"/>
      <rect x="160" y="120" width="50" height="110" fill="#4E7C7A"/>
      <rect x="230" y="85" width="50" height="145" fill="#4E7C7A"/>
      <rect x="300" y="40" width="50" height="190" fill="#E3120B"/>
      <rect x="370" y="10" width="50" height="220" fill="#E3120B"/>
    </g>
    <!-- Dollar labels -->
    <g fill="#1A2534" font-family="Georgia, serif" font-size="10" text-anchor="middle" font-weight="600">
      <text x="45" y="248">$5M</text>
      <text x="115" y="248">$12M</text>
      <text x="185" y="248">$25M</text>
      <text x="255" y="248">$42M</text>
      <text x="325" y="248">$65M</text>
      <text x="395" y="248">$80M</text>
    </g>
    <!-- Dashed trend line -->
    <path d="M45 208 L115 190 L185 175 L255 158 L325 130 L395 100" stroke="#1A2534" stroke-width="1.5" fill="none" stroke-dasharray="3 3" opacity="0.5"/>
    <!-- Circled callout on top bar -->
    <g>
      <circle cx="395" cy="10" r="24" fill="none" stroke="#E3120B" stroke-width="3"/>
      <text x="440" y="14" fill="#E3120B" font-family="Georgia, serif" font-size="14" font-weight="700">Series B</text>
    </g>
    <text x="0" y="280" fill="#1A2534" font-family="Georgia, serif" font-style="italic" font-size="11" opacity="0.75">SEED &rarr; A &rarr; B &nbsp;·&nbsp; CUMULATIVE RAISED</text>
  </g>

  <!-- $ symbol accent -->
  <text x="1100" y="200" fill="#E3120B" font-family="Georgia, serif" font-size="180" font-weight="700" text-anchor="middle" opacity="0.85">$</text>
</svg>
