<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of a high-voltage transmission corridor at twilight">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf4d4"/>
      <stop offset="0.55" stop-color="#f6c947"/>
      <stop offset="1" stop-color="#1b2a3b"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2a3b"/>
      <stop offset="1" stop-color="#0c1622"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="900" cy="220" r="52" fill="#fde9a7" opacity="0.85"/>
  <!-- Distant mountains -->
  <path d="M0 245 L120 195 L200 220 L320 175 L460 210 L580 185 L720 215 L860 200 L1000 225 L1200 205 L1200 360 L0 360 Z" fill="#2a3d52" opacity="0.7"/>
  <path d="M0 275 L160 245 L280 265 L420 235 L560 260 L700 245 L840 268 L980 248 L1200 270 L1200 360 L0 360 Z" fill="#1b2a3b"/>
  <!-- Ground -->
  <rect y="295" width="1200" height="65" fill="url(#ground)"/>
  <!-- Pylon 1 (large, foreground) -->
  <g stroke="#0a0f17" stroke-width="3.2" fill="none" stroke-linejoin="miter" stroke-linecap="square">
    <!-- Main legs -->
    <line x1="180" y1="80" x2="140" y2="295"/>
    <line x1="180" y1="80" x2="220" y2="295"/>
    <!-- Cross diagonals -->
    <line x1="170" y1="120" x2="190" y2="120"/>
    <line x1="160" y1="160" x2="200" y2="160"/>
    <line x1="150" y1="205" x2="210" y2="205"/>
    <line x1="143" y1="252" x2="217" y2="252"/>
    <line x1="170" y1="120" x2="200" y2="160"/>
    <line x1="190" y1="120" x2="160" y2="160"/>
    <line x1="160" y1="160" x2="210" y2="205"/>
    <line x1="200" y1="160" x2="150" y2="205"/>
    <line x1="150" y1="205" x2="217" y2="252"/>
    <line x1="210" y1="205" x2="143" y2="252"/>
    <!-- Cross arms -->
    <line x1="115" y1="115" x2="245" y2="115"/>
    <line x1="115" y1="115" x2="180" y2="100"/>
    <line x1="245" y1="115" x2="180" y2="100"/>
    <line x1="100" y1="150" x2="260" y2="150"/>
    <line x1="100" y1="150" x2="180" y2="135"/>
    <line x1="260" y1="150" x2="180" y2="135"/>
    <line x1="85" y1="185" x2="275" y2="185"/>
    <line x1="85" y1="185" x2="180" y2="170"/>
    <line x1="275" y1="185" x2="180" y2="170"/>
  </g>
  <!-- Insulators on pylon 1 -->
  <g fill="#0a0f17">
    <rect x="113" y="115" width="6" height="10"/>
    <rect x="241" y="115" width="6" height="10"/>
    <rect x="98" y="150" width="6" height="10"/>
    <rect x="256" y="150" width="6" height="10"/>
    <rect x="83" y="185" width="6" height="10"/>
    <rect x="271" y="185" width="6" height="10"/>
  </g>
  <!-- Pylon 2 (mid) -->
  <g stroke="#0a0f17" stroke-width="2.2" fill="none">
    <line x1="490" y1="135" x2="465" y2="295"/>
    <line x1="490" y1="135" x2="515" y2="295"/>
    <line x1="475" y1="180" x2="505" y2="180"/>
    <line x1="470" y1="215" x2="510" y2="215"/>
    <line x1="467" y1="252" x2="513" y2="252"/>
    <line x1="475" y1="180" x2="510" y2="215"/>
    <line x1="505" y1="180" x2="470" y2="215"/>
    <line x1="470" y1="215" x2="513" y2="252"/>
    <line x1="510" y1="215" x2="467" y2="252"/>
    <line x1="447" y1="158" x2="533" y2="158"/>
    <line x1="447" y1="158" x2="490" y2="148"/>
    <line x1="533" y1="158" x2="490" y2="148"/>
    <line x1="435" y1="185" x2="545" y2="185"/>
    <line x1="435" y1="185" x2="490" y2="175"/>
    <line x1="545" y1="185" x2="490" y2="175"/>
  </g>
  <!-- Pylon 3 (far) -->
  <g stroke="#0a0f17" stroke-width="1.6" fill="none" opacity="0.9">
    <line x1="780" y1="175" x2="765" y2="290"/>
    <line x1="780" y1="175" x2="795" y2="290"/>
    <line x1="773" y1="208" x2="787" y2="208"/>
    <line x1="769" y1="235" x2="791" y2="235"/>
    <line x1="765" y1="262" x2="795" y2="262"/>
    <line x1="753" y1="192" x2="807" y2="192"/>
    <line x1="753" y1="192" x2="780" y2="184"/>
    <line x1="807" y1="192" x2="780" y2="184"/>
  </g>
  <!-- Pylon 4 (farthest) -->
  <g stroke="#0a0f17" stroke-width="1.2" fill="none" opacity="0.78">
    <line x1="1030" y1="200" x2="1020" y2="285"/>
    <line x1="1030" y1="200" x2="1040" y2="285"/>
    <line x1="1018" y1="215" x2="1042" y2="215"/>
    <line x1="1018" y1="215" x2="1030" y2="207"/>
    <line x1="1042" y1="215" x2="1030" y2="207"/>
  </g>
  <!-- Conductor wires -->
  <g stroke="#0a0f17" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M115 115 Q300 138 447 158 T753 192 Q900 205 1018 215"/>
    <path d="M180 100 Q330 125 490 148 T780 184 Q900 200 1030 207"/>
    <path d="M245 115 Q360 140 533 158 T807 192 Q920 205 1042 215"/>
    <path d="M100 150 Q300 168 447 158 T753 192 Q900 215 1018 215"/>
    <path d="M260 150 Q380 168 533 158 T807 192 Q920 215 1042 215"/>
    <path d="M85 185 Q300 200 435 185 T753 208 Q900 222 1018 215"/>
    <path d="M275 185 Q400 200 545 185 T807 208 Q920 222 1042 215"/>
  </g>
</svg>
