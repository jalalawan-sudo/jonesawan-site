<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of a natural gas combined-cycle power plant">
  <defs>
    <linearGradient id="gpsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dde7ee"/>
      <stop offset="1" stop-color="#a8b9c6"/>
    </linearGradient>
    <linearGradient id="gpground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3640"/>
      <stop offset="1" stop-color="#161c22"/>
    </linearGradient>
    <radialGradient id="steam" cx="0.5" cy="1" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Sky -->
  <rect width="1200" height="290" fill="url(#gpsky)"/>
  <!-- Steam clouds rising (behind stacks) -->
  <ellipse cx="300" cy="60" rx="120" ry="50" fill="url(#steam)"/>
  <ellipse cx="380" cy="40" rx="100" ry="40" fill="url(#steam)"/>
  <ellipse cx="720" cy="55" rx="110" ry="48" fill="url(#steam)"/>
  <ellipse cx="790" cy="35" rx="90" ry="38" fill="url(#steam)"/>
  <!-- Ground -->
  <rect y="290" width="1200" height="70" fill="url(#gpground)"/>
  <line x1="0" y1="294" x2="1200" y2="294" stroke="#0a0f17" stroke-width="1"/>
  <!-- Left smokestacks (two tall) -->
  <g stroke="#0a0f17" stroke-width="1.5">
    <!-- Stack 1 -->
    <rect x="245" y="85" width="34" height="205" fill="#7a8893"/>
    <rect x="240" y="80" width="44" height="14" fill="#5d6e7e"/>
    <rect x="247" y="100" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="247" y="140" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="247" y="180" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="247" y="220" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="247" y="260" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <!-- Stack 2 -->
    <rect x="335" y="65" width="34" height="225" fill="#7a8893"/>
    <rect x="330" y="60" width="44" height="14" fill="#5d6e7e"/>
    <rect x="337" y="82" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="337" y="125" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="337" y="170" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="337" y="215" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="337" y="260" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
  </g>
  <!-- Cooling tower (hyperboloid, center-left) -->
  <g stroke="#0a0f17" stroke-width="1.6" fill="#9aa6b0">
    <path d="M460 290 L470 145 Q500 110 530 145 L540 290 Z"/>
    <path d="M470 145 Q500 130 530 145" fill="none" stroke="#0a0f17" stroke-width="1.6"/>
    <path d="M467 165 Q500 152 533 165" fill="none" stroke="#0a0f17" stroke-width="0.8" opacity="0.5"/>
    <path d="M464 195 Q500 184 536 195" fill="none" stroke="#0a0f17" stroke-width="0.8" opacity="0.5"/>
    <path d="M461 225 Q500 215 539 225" fill="none" stroke="#0a0f17" stroke-width="0.8" opacity="0.5"/>
    <path d="M460 255 Q500 246 540 255" fill="none" stroke="#0a0f17" stroke-width="0.8" opacity="0.5"/>
  </g>
  <ellipse cx="500" cy="145" rx="32" ry="6" fill="#5d6e7e" stroke="#0a0f17" stroke-width="1.4"/>
  <ellipse cx="500" cy="140" rx="24" ry="3" fill="url(#steam)" opacity="0.7"/>
  <!-- Right smokestacks (two tall) -->
  <g stroke="#0a0f17" stroke-width="1.5">
    <rect x="665" y="80" width="34" height="210" fill="#7a8893"/>
    <rect x="660" y="75" width="44" height="14" fill="#5d6e7e"/>
    <rect x="667" y="95" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="667" y="135" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="667" y="175" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="667" y="215" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="667" y="255" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="755" y="60" width="34" height="230" fill="#7a8893"/>
    <rect x="750" y="55" width="44" height="14" fill="#5d6e7e"/>
    <rect x="757" y="78" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="757" y="123" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="757" y="168" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="757" y="213" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
    <rect x="757" y="258" width="30" height="6" fill="#0a0f17" opacity="0.5"/>
  </g>
  <!-- Main turbine hall (low long building, foreground center) -->
  <rect x="380" y="225" width="380" height="65" fill="#4a5965" stroke="#0a0f17" stroke-width="1.6"/>
  <rect x="380" y="225" width="380" height="8" fill="#0a0f17" opacity="0.6"/>
  <g fill="#1b2a3b" stroke="#0a0f17" stroke-width="0.8">
    <rect x="395" y="248" width="16" height="32"/>
    <rect x="420" y="248" width="16" height="32"/>
    <rect x="445" y="248" width="16" height="32"/>
    <rect x="470" y="248" width="16" height="32"/>
    <rect x="495" y="248" width="16" height="32"/>
    <rect x="520" y="248" width="16" height="32"/>
    <rect x="545" y="248" width="16" height="32"/>
    <rect x="570" y="248" width="16" height="32"/>
    <rect x="595" y="248" width="16" height="32"/>
    <rect x="620" y="248" width="16" height="32"/>
    <rect x="645" y="248" width="16" height="32"/>
    <rect x="670" y="248" width="16" height="32"/>
    <rect x="695" y="248" width="16" height="32"/>
    <rect x="720" y="248" width="16" height="32"/>
    <rect x="745" y="248" width="16" height="32"/>
  </g>
  <!-- Auxiliary block left -->
  <rect x="200" y="245" width="170" height="45" fill="#37444f" stroke="#0a0f17" stroke-width="1.4"/>
  <rect x="200" y="245" width="170" height="6" fill="#0a0f17" opacity="0.6"/>
  <g fill="#1b2a3b" stroke="#0a0f17" stroke-width="0.6">
    <rect x="215" y="263" width="12" height="22"/>
    <rect x="235" y="263" width="12" height="22"/>
    <rect x="255" y="263" width="12" height="22"/>
    <rect x="275" y="263" width="12" height="22"/>
    <rect x="295" y="263" width="12" height="22"/>
    <rect x="315" y="263" width="12" height="22"/>
    <rect x="335" y="263" width="12" height="22"/>
  </g>
  <!-- Auxiliary block right -->
  <rect x="770" y="245" width="170" height="45" fill="#37444f" stroke="#0a0f17" stroke-width="1.4"/>
  <rect x="770" y="245" width="170" height="6" fill="#0a0f17" opacity="0.6"/>
  <g fill="#1b2a3b" stroke="#0a0f17" stroke-width="0.6">
    <rect x="785" y="263" width="12" height="22"/>
    <rect x="805" y="263" width="12" height="22"/>
    <rect x="825" y="263" width="12" height="22"/>
    <rect x="845" y="263" width="12" height="22"/>
    <rect x="865" y="263" width="12" height="22"/>
    <rect x="885" y="263" width="12" height="22"/>
    <rect x="905" y="263" width="12" height="22"/>
  </g>
  <!-- Far-right storage tanks -->
  <g stroke="#0a0f17" stroke-width="1.4">
    <ellipse cx="990" cy="232" rx="40" ry="6" fill="#9aa6b0"/>
    <rect x="950" y="232" width="80" height="58" fill="#9aa6b0"/>
    <ellipse cx="990" cy="290" rx="40" ry="6" fill="#5d6e7e"/>
    <ellipse cx="1080" cy="246" rx="32" ry="5" fill="#9aa6b0"/>
    <rect x="1048" y="246" width="64" height="44" fill="#9aa6b0"/>
    <ellipse cx="1080" cy="290" rx="32" ry="5" fill="#5d6e7e"/>
    <ellipse cx="1148" cy="252" rx="26" ry="4" fill="#9aa6b0"/>
    <rect x="1122" y="252" width="52" height="38" fill="#9aa6b0"/>
    <ellipse cx="1148" cy="290" rx="26" ry="4" fill="#5d6e7e"/>
  </g>
  <!-- Piping bridge between tank farm and main hall -->
  <g stroke="#0a0f17" stroke-width="1.3" fill="none">
    <line x1="940" y1="258" x2="950" y2="258"/>
    <line x1="940" y1="268" x2="950" y2="268"/>
  </g>
  <!-- Stair/access tower -->
  <g stroke="#0a0f17" stroke-width="1" fill="#5d6e7e">
    <rect x="372" y="200" width="14" height="90"/>
    <line x1="372" y1="215" x2="386" y2="215" stroke="#0a0f17" stroke-width="0.7"/>
    <line x1="372" y1="230" x2="386" y2="230" stroke="#0a0f17" stroke-width="0.7"/>
    <line x1="372" y1="245" x2="386" y2="245" stroke="#0a0f17" stroke-width="0.7"/>
    <line x1="372" y1="260" x2="386" y2="260" stroke="#0a0f17" stroke-width="0.7"/>
    <line x1="372" y1="275" x2="386" y2="275" stroke="#0a0f17" stroke-width="0.7"/>
  </g>
</svg>
