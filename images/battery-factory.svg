      <g transform="translate(20 10)">
        <rect x="0" y="0" width="42" height="60" rx="3" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.8"/>
        <rect x="14" y="-6" width="14" height="8" fill="#1A2534"/>
        <text x="21" y="38" text-anchor="middle" fill="#F1EAD8" font-family="Georgia, serif" font-size="9" font-weight="700">Na+</text>
