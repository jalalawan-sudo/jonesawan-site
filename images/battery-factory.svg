<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of a grid-scale battery storage manufacturing facility">
  <defs>
    <pattern id="dot-bg-b" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="0.9" fill="#1A2534" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" fill="#F1EAD8"/>
  <rect width="1200" height="360" fill="url(#dot-bg-b)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#E3120B"/>

  <!-- Ground line -->
  <line x1="0" y1="290" x2="1200" y2="290" stroke="#1A2534" stroke-width="1.8"/>

  <!-- Factory building (Economist-style isometric-ish) -->
  <g transform="translate(80 105)">
    <!-- Main hall -->
    <rect x="0" y="60" width="380" height="125" fill="#1A2534"/>
    <!-- Sawtooth roof -->
    <g fill="#1A2534" stroke="#F1EAD8" stroke-width="1.5">
      <polygon points="0,60 40,20 80,60"/>
      <polygon points="80,60 120,20 160,60"/>
      <polygon points="160,60 200,20 240,60"/>
      <polygon points="240,60 280,20 320,60"/>
      <polygon points="320,60 360,20 380,60 380,60"/>
    </g>
    <!-- Windows on roof sawtooth -->
    <g fill="#F5C947">
      <polygon points="40,20 78,58 62,60 40,38"/>
      <polygon points="120,20 158,58 142,60 120,38"/>
      <polygon points="200,20 238,58 222,60 200,38"/>
      <polygon points="280,20 318,58 302,60 280,38"/>
    </g>
    <!-- Front door -->
    <rect x="170" y="130" width="40" height="55" fill="#F1EAD8"/>
    <!-- Windows -->
    <g fill="#F5C947" opacity="0.85">
      <rect x="30" y="90" width="24" height="24"/>
      <rect x="70" y="90" width="24" height="24"/>
      <rect x="110" y="90" width="24" height="24"/>
      <rect x="240" y="90" width="24" height="24"/>
      <rect x="280" y="90" width="24" height="24"/>
      <rect x="320" y="90" width="24" height="24"/>
    </g>
    <!-- Smokestack (short, no smoke — clean energy) -->
    <rect x="345" y="0" width="18" height="60" fill="#1A2534"/>
  </g>

