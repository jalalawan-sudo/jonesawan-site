<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Illustration of FERC action on large-load grid integration">
  <defs>
    <pattern id="dot-bg-g" x="0" y="0" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="1.6" cy="1.6" r="0.9" fill="#1A2534" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" fill="#F1EAD8"/>
  <rect width="1200" height="360" fill="url(#dot-bg-g)"/>
  <rect x="0" y="0" width="1200" height="6" fill="#E3120B"/>

  <!-- Gavel (left side) -->
  <g transform="translate(90 100)">
    <!-- Handle -->
    <rect x="0" y="80" width="150" height="18" fill="#1A2534" transform="rotate(-18 75 89)"/>
    <!-- Head of gavel -->
    <g transform="translate(150 40) rotate(-18)">
      <rect x="0" y="0" width="100" height="60" fill="#1A2534"/>
      <rect x="-8" y="-6" width="6" height="72" fill="#1A2534"/>
      <rect x="102" y="-6" width="6" height="72" fill="#1A2534"/>
      <!-- Wood grain lines -->
      <g stroke="#F1EAD8" stroke-width="1" opacity="0.25">
        <line x1="10" y1="12" x2="90" y2="12"/>
        <line x1="10" y1="30" x2="90" y2="30"/>
        <line x1="10" y1="48" x2="90" y2="48"/>
      </g>
    </g>
    <!-- Sound block -->
    <rect x="130" y="180" width="150" height="20" fill="#1A2534"/>
    <!-- Impact lines -->
    <g stroke="#E3120B" stroke-width="3" stroke-linecap="round">
      <line x1="180" y1="170" x2="175" y2="155"/>
      <line x1="205" y1="168" x2="205" y2="150"/>
      <line x1="230" y1="170" x2="235" y2="155"/>
    </g>
  </g>

  <!-- Grid diagram on right side (nodes and edges) -->
  <g transform="translate(500 60)">
    <!-- Boundary box (RTO territory) -->
    <rect x="0" y="0" width="580" height="240" fill="none" stroke="#1A2534" stroke-width="2" stroke-dasharray="5 4" opacity="0.55"/>
    <!-- Grid nodes -->
    <g>
      <!-- Small nodes (existing load) -->
      <circle cx="90" cy="180" r="10" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.5"/>
      <circle cx="150" cy="60" r="10" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.5"/>
      <circle cx="240" cy="120" r="10" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.5"/>
      <circle cx="330" cy="200" r="10" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.5"/>
      <circle cx="450" cy="90" r="10" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.5"/>
      <circle cx="510" cy="180" r="10" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.5"/>
      <!-- Large-load nodes (data centers) - shown as squares -->
      <g fill="#E3120B" stroke="#1A2534" stroke-width="1.8">
        <rect x="185" y="30" width="30" height="30"/>
        <rect x="390" y="150" width="30" height="30"/>
        <rect x="60" y="100" width="30" height="30"/>
      </g>
      <!-- Transmission lines -->
      <g stroke="#1A2534" stroke-width="1.5" fill="none">
        <line x1="90" y1="180" x2="75" y2="130"/>
        <line x1="75" y1="115" x2="150" y2="60"/>
        <line x1="150" y1="60" x2="200" y2="60"/>
        <line x1="200" y1="60" x2="240" y2="120"/>
        <line x1="240" y1="120" x2="330" y2="200"/>
        <line x1="240" y1="120" x2="405" y2="165"/>
        <line x1="330" y1="200" x2="405" y2="165"/>
        <line x1="405" y1="165" x2="510" y2="180"/>
        <line x1="450" y1="90" x2="510" y2="180"/>
        <line x1="240" y1="120" x2="450" y2="90"/>
      </g>
    </g>
    <!-- Highlight rings around large-load nodes -->
    <g fill="none" stroke="#E3120B" stroke-width="2" opacity="0.55">
      <circle cx="200" cy="45" r="25"/>
      <circle cx="405" cy="165" r="25"/>
      <circle cx="75" cy="115" r="25"/>
    </g>
    <!-- Legend -->
    <g transform="translate(0 260)" fill="#1A2534" font-family="Georgia, serif" font-size="11">
      <circle cx="8" cy="0" r="7" fill="#4E7C7A" stroke="#1A2534" stroke-width="1.2"/>
      <text x="22" y="4">existing load</text>
      <rect x="150" y="-6" width="14" height="14" fill="#E3120B" stroke="#1A2534" stroke-width="1.2"/>
      <text x="170" y="4">large load (data center)</text>
    </g>
  </g>

  <!-- Header text -->
  <text x="600" y="330" text-anchor="middle" fill="#1A2534" font-family="Georgia, serif" font-style="italic" font-size="12" opacity="0.75">FERC SHOW-CAUSE ORDER &nbsp;·&nbsp; ALL SIX RTOs/ISOs INCL. CAISO</text>
</svg>
